version: '3.8'

services:
  app:
    build: .
    container_name: moveup-seo-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./log_sites.json:/app/log_sites.json
      - ./client_secret.json:/app/client_secret.json
      - ./token.pickle:/app/token.pickle
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok-tunnel
    command: ["http", "app:8000", "--domain=${NGROK_DOMAIN}"]
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - app
    restart: unless-stopped
